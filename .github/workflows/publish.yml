name: Publish to PyPI (Trusted Publishing)

# Publishes when you push a version tag like v0.1.22.
# One-time setup on PyPI: project Settings -> Publishing -> add GitHub
# publisher (owner: donkk11, repo: nkama-fact-benchmark, workflow:
# publish.yml, environment: pypi). No API token needed after that.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - name: Security audit release artifacts
        run: uvx --from dist/*.whl nkama-fact-benchmark security-audit dist/*.whl dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
